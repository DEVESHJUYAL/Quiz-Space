server.port=${PORT:8080}
spring.application.name=quiz-space

# ── PostgreSQL ────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# update = Hibernate creates missing tables and adds missing columns automatically.
# This is safe because all CREATE TABLE uses IF NOT EXISTS equivalent logic in Hibernate.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Cloudinary ───────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── File uploads ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ─────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ── Admin Account ─────────────────────────────────────────────
admin.email=${ADMIN_EMAIL:admin@quizspace.app}
admin.password=${ADMIN_PASSWORD:Admin@123}
admin.name=${ADMIN_NAME:Quiz Space Admin}
